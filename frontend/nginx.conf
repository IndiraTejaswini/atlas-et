server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxies to the backend service name from docker-compose.yml — same
    # relationship as the Vite dev proxy in vite.config.js, just for the
    # built/production image instead of `npm run dev`.
    location /api/ {
        proxy_pass http://backend:8100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Required for the SSE endpoints (/api/stream/*, /api/ask/stream) to
        # flush events promptly instead of nginx buffering the whole
        # response before forwarding it — the same failure mode Server-Sent
        # Events hit behind any buffering proxy, not nginx-specific.
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection "";
    }

    # React Router client-side routing — any path that isn't a static asset
    # falls back to index.html so deep links (e.g. /documents/WO-2415) work
    # on a hard refresh instead of 404ing at the nginx layer.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
