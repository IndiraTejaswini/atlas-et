services:
  backend:
    build: ./backend
    ports:
      - "8100:8100"
    environment:
      - ATLAS_CORS_ORIGINS=http://localhost:8080
      # Uncomment to require an API key on /api/ingest and alert ack/unack —
      # see docs/ARCHITECTURE.md §14 and README.md for the full env var list
      # (ATLAS_API_KEYS for multiple roles, ATLAS_REQUIRE_READ_AUTH, etc.):
      # - ATLAS_API_KEY=change-me
    volumes:
      # Named volume over the whole data/ dir: Docker seeds a brand-new
      # empty named volume from the image's existing content at that path on
      # first run (documented Docker behaviour), so the baked-in seed corpus
      # is preserved — this volume is what then lets the FAISS semantic-index
      # cache and the alert-acknowledgement store survive a restart.
      - atlas-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  atlas-data:
